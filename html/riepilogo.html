<h2 class="mb-3">Riepilogo</h2>
<div class="row g-3 mb-3">
  <div class="col-12 col-lg-4">
    <div class="card border-0 shadow-sm h-100 bg-dark text-light">
      <div class="card-body">
        <div class="text-muted">Ordini (Novembre)</div>
        <div class="fs-2 fw-bold mt-2" id="card-orders-month">0</div>
      </div>
    </div>
  </div>
  <div class="col-12 col-lg-4">
    <div class="card border-0 shadow-sm h-100 bg-dark text-light">
      <div class="card-body">
        <div class="text-muted">Ordini Totali</div>
        <div class="fs-2 fw-bold mt-2" id="card-orders-total">0</div>
      </div>
    </div>
  </div>
  <div class="col-12 col-lg-4">
    <div class="card border-0 shadow-sm h-100 bg-dark text-light h-100">
      <div class="card-body">
        <div class="text-muted mb-2">Distribuzione ordini per Paese</div>
        <div class="d-flex align-items-center">
          <div style="width: 120px; min-width: 120px;">
            <canvas id="pie-orders-country" width="120" height="120"></canvas>
          </div>
          <div class="ms-3 flex-grow-1">
            <ul class="list-unstyled mb-0" id="pie-legend"></ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="row g-3 mt-1">
	<div class="col-12 col-xl-6">
		<div class="card border-0 shadow-sm h-100 bg-dark text-light">
			<div class="card-header border-0 bg-dark text-light">Ultimi 10 ordini</div>
			<div class="card-body">
				<div class="table-responsive">
					<table class="table table-dark table-striped table-sm align-middle mb-0" id="tbl-last-orders">
						<thead><tr><th>ID</th><th>Data</th><th>Destinatario</th><th>Città</th><th class="text-end">Spedizione €</th></tr></thead>
						<tbody></tbody>
					</table>
				</div>
			</div>
		</div>
	</div>

	<div class="col-12 col-xl-6">
		<div class="card border-0 shadow-sm h-100 bg-dark text-light">
			<div class="card-header border-0 bg-dark text-light">Prodotti sotto scorta (&lt; 10)</div>
			<div class="card-body">
				<div class="table-responsive">
					<table class="table table-dark table-striped table-sm align-middle mb-0" id="tbl-low-stock">
						<thead><tr><th>Prodotto</th><th class="text-end">Disponibilità</th><th class="text-end">Soglia</th></tr></thead>
						<tbody></tbody>
					</table>
				</div>
			</div>
		</div>
	</div>
</div>
