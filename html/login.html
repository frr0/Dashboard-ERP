<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In</title>
    <link href="../css/dashboard.css" rel="stylesheet">
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #343a40;
        color: #e4e6e7;
      }
      .form-signin {
        width: 100%;
        max-width: 370px;
        padding: 2.5rem 2rem 2rem 2rem;
        margin: auto;
        background: #23272b;
        border-radius: 1.25rem;
        box-shadow: 0 0.5rem 1.5rem #0005;
        border: 1px solid #444a50;
      }
      .form-signin .form-control {
        background: #181b1f;
        color: #e4e6e7;
        border-color: #444a50;
      }
      .form-signin .form-control:focus {
        background: #23272b;
        color: #fff;
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.2rem #0d6efd33;
      }
      .form-signin .form-check-input {
        background: #181b1f;
        border-color: #444a50;
      }
      .form-signin .btn-primary {
        background: #0d6efd;
        border-color: #0d6efd;
        color: #fff;
        font-weight: 600;
        letter-spacing: 0.03em;
      }
      .form-signin .btn-primary:hover {
        filter: brightness(1.1);
      }
      .logo {
        width: 64px;
        height: 64px;
        margin-bottom: 1.5rem;
        display: block;
        margin-left: auto;
        margin-right: auto;
      }
      .form-signin h1 {
        font-size: 2.2rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
      }
      .form-signin .form-check-label {
        color: #b0b3b8;
      }
      .form-signin .text-muted {
        color: #b0b3b8 !important;
      }
    </style>
  </head>
  <body>
    <main class="form-signin text-center">
      <img class="logo" src="https://getbootstrap.com/docs/5.3/assets/brand/bootstrap-logo-shadow.png" alt="Bootstrap Logo">
      <h1 class="mb-3">Please sign in</h1>
      <form autocomplete="on">
        <div class="form-floating mb-2">
          <input type="email" class="form-control" id="floatingInput" placeholder="Email address" required autofocus>
          <label for="floatingInput">Email address</label>
        </div>
        <div class="form-floating mb-2">
          <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
          <label for="floatingPassword">Password</label>
        </div>
        <div class="checkbox mb-3 text-start">
          <input class="form-check-input" type="checkbox" value="remember-me" id="rememberMe">
          <label class="form-check-label ms-2" for="rememberMe">Remember me</label>
        </div>
        <button class="w-100 btn btn-lg btn-primary" type="submit">Sign in</button>
        <p class="mt-4 mb-1 text-muted">&copy; 2017–2025</p>
      </form>
    </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/login.js"></script>
  </body>
</html>
