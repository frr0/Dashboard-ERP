<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
<script src="js/search.js"></script>
<script src="js/detailManager.js"></script>
<script src="js/loadHtml.js"></script>
<script src="js/navigation.js"></script>
<script src="js/theme.js"></script>
<script src="js/gridjs.js"></script>
<!-- <script src="js/riepilogo.js"></script> -->
<script src="dashboard.js"></script>
<script>
// Auth + UI personalization + logout
document.addEventListener('DOMContentLoaded', function() {

  // Set username and avatar based on email
  const email = localStorage.getItem('erp-email') || 'admin@admin.com';
  const role = localStorage.getItem('erp-role') || 'admin';
  const nameFromEmail = (email.split('@')[0] || 'user').replace(/\./g, ' ');
  const usernameEl = document.getElementById('navbar-username');
  const avatarEl = document.getElementById('navbar-avatar');
  if (usernameEl) usernameEl.textContent = nameFromEmail.charAt(0).toUpperCase() + nameFromEmail.slice(1);
  if (avatarEl) avatarEl.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(nameFromEmail)}&background=6ea8fe&color=fff&rounded=true&size=32`;

  // Hide Dipendenti if role is user
  if (role === 'user') {
    const dipLink = document.getElementById('link-dipendenti');
    if (dipLink) {
      const li = dipLink.closest('li');
      if (li) li.style.display = 'none';
    }
  }
});
</script>

</body>
